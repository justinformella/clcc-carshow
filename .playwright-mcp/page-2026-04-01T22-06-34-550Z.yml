      - generic [ref=e75]: Our Cause
      - heading "Driving Out Hunger" [level=2] [ref=e76]
      - heading "Crystal Lake Food Pantry" [level=3] [ref=e77]
      - paragraph [ref=e78]: Every registration, every sponsorship—all net proceeds go directly to the Crystal Lake Food Pantry. Since 1983, they've been the safety net for families facing food insecurity in McHenry County.
      - paragraph [ref=e79]: In our community, 1 in 8 people struggle with hunger. The Food Pantry serves over 800 families each month, providing nutritious food with dignity and compassion. Your participation in this car show helps stock their shelves and fill empty plates.
