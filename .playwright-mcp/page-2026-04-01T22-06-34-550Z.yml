  - generic [ref=e161]:
    - generic [ref=e162]:
      - generic [ref=e163]: Questions
      - heading "Frequently Asked" [level=2] [ref=e164]
    - generic [ref=e165]:
      - generic [ref=e166]:
        - generic [ref=e167] [cursor=pointer]:
          - generic [ref=e168]: What types of vehicles can participate?
          - generic [ref=e169]: +
        - generic [ref=e170]: All vehicles are welcome! Classic cars, modern sports cars, muscle cars, imports, trucks, motorcycles, and anything with wheels that you're proud of. We celebrate all automotive enthusiasm. There are no year, make, or model restrictions.
      - generic [ref=e171]:
        - generic [ref=e172] [cursor=pointer]:
          - generic [ref=e173]: Can I leave early if needed?
          - generic [ref=e174]: +
        - generic [ref=e175]: For safety reasons, we ask that all show vehicles remain in place until 2:00 PM. This ensures the safety of spectators and maintains the integrity of the show. Emergency exits are available if absolutely necessary. Please inform staff at registration if you anticipate needing to leave early.
      - generic [ref=e176]:
        - generic [ref=e177] [cursor=pointer]:
          - generic [ref=e178]: Are pets allowed at the event?
          - generic [ref=e179]: +
        - generic [ref=e180]: Leashed pets are welcome! Please keep them under control at all times and clean up after them. We ask that pets be kept away from show vehicles unless you're the owner.
      - generic [ref=e181]:
        - generic [ref=e182] [cursor=pointer]:
          - generic [ref=e183]: Is pre-registration required?
          - generic [ref=e184]: +
        - generic [ref=e185]: Pre-registration is strongly encouraged to guarantee your spot. We have limited space for show vehicles, and historically we reach capacity before the event date. Day-of registration may be available but is not guaranteed.
