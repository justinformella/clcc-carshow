    - generic [ref=e59]:
      - generic [ref=e60]: About the Event
      - heading "More Than a Car Show" [level=2] [ref=e61]
      - paragraph [ref=e62]: Every May, three blocks of historic downtown Crystal Lake transform into an open-air showroom—gleaming hot rods, muscle cars, imports, and modern exotics line Grant, Brink, and Williams streets, each one with a story under the hood. This year's show is Sunday, May 17, 2026, with a rain date of Sunday, May 31.
      - paragraph [ref=e63]: Whether you're a lifelong gearhead, a family looking for a great day out, or someone who simply wants to support a good cause, this is your event. Grab a coffee, browse the downtown shops, and soak in the small-town energy—all while all net proceeds go to the Crystal Lake Food Pantry.
