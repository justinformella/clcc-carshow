<!DOCTYPE html>

<html>
<head>
  <title>Take a Cruise Down Route 14 | CLCC Arcade</title>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Press Start 2P', monospace;
           display: flex; align-items: center; justify-content: center; height: 100vh; }
    #racer { position: relative; }
    #canvas { display: block; background-color: #000; }
    #hud { position: absolute; z-index: 1; top: 0; left: 0; right: 0; padding: 8px 12px;
           font-size: 11px; color: #ffd700; background: rgba(0,0,0,0.7); }
    #hud .hud { padding: 4px 8px; margin: 0 4px; }
    #hud .value { color: #fff; font-weight: bold; }
    #hud #speed { float: right; }
    #hud #current_lap_time { float: left; }
    #hud #last_lap_time { float: left; display: none; }
    #hud #fast_lap_time { display: block; width: 14em; margin: 0 auto; text-align: center; }
    #hud #car_name { display: block; clear: both; padding-top: 4px; color: #ffd700; font-size: 13px; }
    #hud #car_stats { display: block; color: #aaa; font-size: 9px; }
    #hud #gear { float: right; color: #4f4; }
    #hud .fastest { color: #ffd700; }
    /* Mobile: compact HUD — hide stats and fastest lap */
    @media (max-width: 800px), (pointer: coarse) {
      #hud { padding: 4px 8px; font-size: 9px; }
      #hud #car_name { font-size: 10px; padding-top: 2px; }
      #hud #car_stats { display: none !important; }
      #hud #fast_lap_time { display: none !important; }
      #hud #last_lap_time { display: none !important; }
      #hud #gear { font-size: 9px; }
      #quit-btn { padding: 4px 10px; font-size: 8px; }
    }
    #quit-btn { position: fixed; top: 12px; right: 12px; z-index: 150;
                background: rgba(0,0,0,0.6); color: #888; border: 1px solid #444;
                padding: 6px 14px; font-family: 'Press Start 2P', monospace; font-size: 9px;
                cursor: pointer; text-decoration: none; border-radius: 4px; }
    #quit-btn:hover { color: #ffd700; border-color: #ffd700; }
    /* Hide tweak UI — keep hidden DOM elements so JS doesn't error */
    #controls, #instructions, #fps, #mute { display: none !important; }
    /* Loading screen */
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 500;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'Press Start 2P', monospace;
    }
    #loading-screen .title { color: #ffd700; font-size: 18px; margin-bottom: 24px; }
    #loading-screen .subtitle { color: #888; font-size: 10px; margin-bottom: 40px; }
    #loading-screen .bar-bg { width: 280px; height: 16px; background: #222; border: 2px solid #444; border-radius: 2px; }
    #loading-screen .bar-fill { height: 100%; width: 0%; background: #ffd700; transition: width 0.3s; }
    #loading-screen .status { color: #555; font-size: 8px; margin-top: 16px; }
  </style>
</head>

<body>

  <div id="loading-screen">
    <div class="title">CLCC ARCADE</div>
    <div class="subtitle">TAKE A CRUISE DOWN ROUTE 14</div>
    <div class="bar-bg"><div class="bar-fill" id="load-bar"></div></div>
    <div class="status" id="load-status">LOADING...</div>
  </div>

  <!-- Hidden controls (kept for JS compatibility, never shown) -->
  <table id="controls" style="display:none">
    <tr><td id="fps"></td></tr>
  </table>
  <div id="instructions" style="display:none"></div>

  <a id="quit-btn" href="/arcade" style="display:none">QUIT</a>

  <div id="racer">
    <div id="hud">
      <span id="speed"            class="hud"><span id="speed_value" class="value">0</span> mph</span>
      <span id="current_lap_time" class="hud">Time: <span id="current_lap_time_value" class="value">0.0</span></span>
      <span id="last_lap_time"    class="hud">Last Lap: <span id="last_lap_time_value" class="value">0.0</span></span>
      <span id="fast_lap_time"    class="hud">Fastest Lap: <span id="fast_lap_time_value" class="value">0.0</span></span>
      <span id="car_name" class="hud" style="display:none"><span id="car_name_value" class="value"></span></span>
      <span id="car_stats" class="hud" style="display:none"><span id="car_stats_value" class="value"></span></span>
      <span id="gear" class="hud" style="display:none">Gear: <span id="gear_value" class="value">1</span></span>
    </div>
    <canvas id="canvas"></canvas>
  </div>

  <audio id='music' muted></audio>
  <span id="mute" style="display:none"></span>

  <script src="stats.js"></script>
  <script src="common.js"></script>
  <script>

    var fps            = 60;                      // how many 'update' frames per second
    var step           = 1/fps;                   // how long is each frame (in seconds)
    var isMobileDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.innerWidth < 800);
    var width          = isMobileDevice ? 640  : 1024;  // lower res on mobile for performance
    var height         = isMobileDevice ? 480  : 768;
    var centrifugal    = 0.3;                     // centrifugal force multiplier when going around curves
    var offRoadDecel   = 0.99;                    // speed multiplier when off road (e.g. you lose 2% speed each update frame)
    var skySpeed       = 0.001;                   // background sky layer scroll speed when going around curve (or up hill)
    var hillSpeed      = 0.002;                   // background hill layer scroll speed when going around curve (or up hill)
    var treeSpeed      = 0.003;                   // background tree layer scroll speed when going around curve (or up hill)
    var skyOffset      = 0;                       // current sky scroll offset
    var hillOffset     = 0;                       // current hill scroll offset
    var treeOffset     = 0;                       // current tree scroll offset
    var segments       = [];                      // array of road segments
    var cars           = [];                      // array of cars on the road
    var stats          = Game.stats('fps');       // mr.doobs FPS counter
    var canvas         = Dom.get('canvas');       // our canvas...
    var ctx            = canvas.getContext('2d'); // ...and its drawing context
    var background     = null;                    // our background image (loaded below)
    var sprites        = null;                    // our spritesheet (loaded below)
    var resolution     = null;                    // scaling factor to provide resolution independence (computed)
    var roadWidth      = 1500;                    // fixed for Route 14
    var segmentLength  = 200;                     // length of a single segment
    var rumbleLength   = 3;                       // number of segments per red/white rumble strip
    var trackLength    = null;                    // z length of entire track (computed)
    var lanes          = 2;                       // two lanes — realistic for Route 14
    var fieldOfView    = 110;                     // fixed for Route 14
    var cameraHeight   = 750;                     // fixed for Route 14
    var cameraDepth    = null;                    // z distance camera is from screen (computed)
    var drawDistance   = isMobileDevice ? 150 : 300;  // shorter draw on mobile for performance
    var playerX        = 0;                       // player x offset from center of road (-1 to 1 to stay independent of roadWidth)
    var playerZ        = null;                    // player relative z distance from camera (computed)
    var fogDensity     = 5;                       // fixed for Route 14
    var position       = 0;                       // current camera Z position (add playerZ to get player's absolute Z position)
    var speed          = 0;                       // current speed
    var maxSpeed       = segmentLength/step * 0.55; // cruise speed — 55% of original, enjoy the scenery
    var accel          =  maxSpeed/10;            // slow acceleration — takes time to get up to speed
    var breaking       = -maxSpeed;               // deceleration rate when braking
    var decel          = -maxSpeed/5;             // 'natural' deceleration rate when neither accelerating, nor braking
    var offRoadDecel   = -maxSpeed/2;             // off road deceleration is somewhere in between
    var offRoadLimit   =  maxSpeed/4;             // limit when off road deceleration no longer applies (e.g. you can always go at least this speed even when off road)
    var totalCars      = isMobileDevice ? 20 : 50;  // fewer cars on mobile for performance
    var currentLapTime = 0;                       // current lap time
    var lastLapTime    = null;                    // last lap time
    var totalLaps      = 3;                       // laps to complete the cruise
    var currentLap     = 1;                       // which lap we're on
    var raceFinished   = false;                   // true when all laps done
    var totalRaceTime  = 0;                       // total time across all laps

    var keyLeft        = false;
    var keyRight       = false;
    var keyFaster      = false;
    var keySlower      = false;

    var hud = {
      speed:            { value: null, dom: Dom.get('speed_value')            },
      current_lap_time: { value: null, dom: Dom.get('current_lap_time_value') },
      last_lap_time:    { value: null, dom: Dom.get('last_lap_time_value')    },
      fast_lap_time:    { value: null, dom: Dom.get('fast_lap_time_value')    },
      car_name:         { value: null, dom: Dom.get('car_name_value')         },
      gear:             { value: null, dom: Dom.get('gear_value')             }
    }

    //=========================================================================
    // FIT CANVAS TO VIEWPORT (maintain aspect ratio, black letterbox)
    //=========================================================================

    function fitCanvas() {
      // The game renders at width x (height + dashHeight) internally
      // Scale the CSS display to fit the viewport while maintaining aspect ratio
      var actualDashH = playerDashImage ? dashHeight : 0;
      var gameW = width;
      var gameH = height + actualDashH;
      var gameAspect = gameW / gameH;

      var vpW = window.innerWidth;
      var vpH = window.innerHeight;
      var vpAspect = vpW / vpH;

      var displayW, displayH;
      if (vpAspect > gameAspect) {
        // Viewport is wider than game — fit to height, black bars on sides
        displayH = vpH;
        displayW = vpH * gameAspect;
      } else {
        // Viewport is taller than game — fit to width, black bars top/bottom
        displayW = vpW;
        displayH = vpW / gameAspect;
      }

      canvas.style.width = Math.round(displayW) + 'px';
      canvas.style.height = Math.round(displayH) + 'px';

      // Size the racer container to match
      var racer = document.getElementById('racer');
      if (racer) {
        racer.style.width = Math.round(displayW) + 'px';
        racer.style.height = Math.round(displayH) + 'px';
      }
    }

    window.addEventListener('resize', fitCanvas);
    // Initial fit after a short delay (wait for canvas dimensions to be set)
    setTimeout(fitCanvas, 100);

    //=========================================================================
    // UPDATE THE GAME WORLD
    //=========================================================================

    function update(dt) {

      if (raceFinished) return;

      var n, car, carW, sprite, spriteW;
      var playerSegment = findSegment(position+playerZ);
      var playerW       = SPRITES.PLAYER_STRAIGHT.w * SPRITES.SCALE;
      var speedPercent  = speed/maxSpeed;
      var dx            = dt * 2 * speedPercent; // at top speed, should be able to cross from left to right (-1 to 1) in 1 second
      var startPosition = position;

      updateCars(dt, playerSegment, playerW);

      position = Util.increase(position, dt * speed, trackLength);

      if (keyLeft)
        playerX = playerX - dx;
      else if (keyRight)
        playerX = playerX + dx;

      playerX = playerX - (dx * speedPercent * playerSegment.curve * centrifugal);

      if (keyFaster)
        speed = Util.accelerate(speed, accel, dt);
      else if (keySlower)
        speed = Util.accelerate(speed, breaking, dt);
      else
        speed = Util.accelerate(speed, decel, dt);


      if ((playerX < -1) || (playerX > 1)) {

        if (speed > offRoadLimit)
          speed = Util.accelerate(speed, offRoadDecel, dt);

        for(n = 0 ; n < playerSegment.sprites.length ; n++) {
          sprite  = playerSegment.sprites[n];
          spriteW = sprite.source.w * SPRITES.SCALE;
          if (Util.overlap(playerX, playerW, sprite.offset + spriteW/2 * (sprite.offset > 0 ? 1 : -1), spriteW)) {
            speed = maxSpeed/5;
            position = Util.increase(playerSegment.p1.world.z, -playerZ, trackLength); // stop in front of sprite (at front of segment)
            break;
          }
        }
      }

      for(n = 0 ; n < playerSegment.cars.length ; n++) {
        car  = playerSegment.cars[n];
        carW = car.sprite.w * SPRITES.SCALE;
        if (speed > car.speed) {
          if (Util.overlap(playerX, playerW, car.offset, carW, 0.8)) {
            speed    = car.speed * (car.speed/speed);
            position = Util.increase(car.z, -playerZ, trackLength);
            break;
          }
        }
      }

      playerX = Util.limit(playerX, -3, 3);     // dont ever let it go too far out of bounds
      speed   = Util.limit(speed, 0, maxSpeed); // or exceed maxSpeed

      skyOffset  = Util.increase(skyOffset,  skySpeed  * playerSegment.curve * (position-startPosition)/segmentLength, 1);
      hillOffset = Util.increase(hillOffset, hillSpeed * playerSegment.curve * (position-startPosition)/segmentLength, 1);
      treeOffset = Util.increase(treeOffset, treeSpeed * playerSegment.curve * (position-startPosition)/segmentLength, 1);

      if (position > playerZ && !raceFinished) {
        if (currentLapTime && (startPosition < playerZ)) {
          lastLapTime    = currentLapTime;
          totalRaceTime += lastLapTime;
          currentLapTime = 0;

          if (lastLapTime <= Util.toFloat(Dom.storage.fast_lap_time)) {
            Dom.storage.fast_lap_time = lastLapTime;
            updateHud('fast_lap_time', formatTime(lastLapTime));
          }
          updateHud('last_lap_time', formatTime(lastLapTime));
          Dom.show('last_lap_time');

          currentLap++;
          if (currentLap > totalLaps) {
            // Race complete!
            raceFinished = true;
            speed = 0;
            showFinishScreen();
          }
        }
        else {
          currentLapTime += dt;
        }
      }

      updateHud('speed',            playerCarData ? Math.round((speed/maxSpeed) * playerTopSpeedMph) : 5 * Math.round(speed/500));
      if (playerCarData) updateHud('gear', currentGear);
      updateHud('current_lap_time', 'Lap ' + Math.min(currentLap, totalLaps) + '/' + totalLaps + '  ' + formatTime(currentLapTime));

      // Engine audio — start on first keypress (browser requires user gesture)
      if (engineSound && !engineSound.running && (keyFaster || speed > 0)) {
        startEngineSound(engineSound);
      }
      if (engineSound && engineSound.running) {
        updateEngineSound(engineSound, speed / maxSpeed, keyFaster);
      }
    }

    //-------------------------------------------------------------------------

    function updateCars(dt, playerSegment, playerW) {
      var n, car, oldSegment, newSegment;
      for(n = 0 ; n < cars.length ; n++) {
        car         = cars[n];
        oldSegment  = findSegment(car.z);
        car.offset  = car.offset + updateCarOffset(car, oldSegment, playerSegment, playerW);
        car.z       = Util.increase(car.z, dt * car.speed, trackLength);
        car.percent = Util.percentRemaining(car.z, segmentLength); // useful for interpolation during rendering phase
        newSegment  = findSegment(car.z);
        if (oldSegment != newSegment) {
          index = oldSegment.cars.indexOf(car);
          oldSegment.cars.splice(index, 1);
          newSegment.cars.push(car);
        }
      }
    }

    function updateCarOffset(car, carSegment, playerSegment, playerW) {

      var i, j, dir, segment, otherCar, otherCarW, lookahead = 20, carW = car.sprite.w * SPRITES.SCALE;

      // optimization, dont bother steering around other cars when 'out of sight' of the player
      if ((carSegment.index - playerSegment.index) > drawDistance)
        return 0;

      for(i = 1 ; i < lookahead ; i++) {
        segment = segments[(carSegment.index+i)%segments.length];

        if ((segment === playerSegment) && (car.speed > speed) && (Util.overlap(playerX, playerW, car.offset, carW, 1.2))) {
          if (playerX > 0.5)
            dir = -1;
          else if (playerX < -0.5)
            dir = 1;
          else
            dir = (car.offset > playerX) ? 1 : -1;
          return dir * 1/i * (car.speed-speed)/maxSpeed; // the closer the cars (smaller i) and the greated the speed ratio, the larger the offset
        }

        for(j = 0 ; j < segment.cars.length ; j++) {
          otherCar  = segment.cars[j];
          otherCarW = otherCar.sprite.w * SPRITES.SCALE;
          if ((car.speed > otherCar.speed) && Util.overlap(car.offset, carW, otherCar.offset, otherCarW, 1.2)) {
            if (otherCar.offset > 0.5)
              dir = -1;
            else if (otherCar.offset < -0.5)
              dir = 1;
            else
              dir = (car.offset > otherCar.offset) ? 1 : -1;
            return dir * 1/i * (car.speed-otherCar.speed)/maxSpeed;
          }
        }
      }

      // if no cars ahead, but I have somehow ended up off road, then steer back on
      if (car.offset < -0.9)
        return 0.1;
      else if (car.offset > 0.9)
        return -0.1;
      else
        return 0;
    }

    //-------------------------------------------------------------------------

    function updateHud(key, value) { // accessing DOM can be slow, so only do it if value has changed
      if (hud[key].value !== value) {
        hud[key].value = value;
        Dom.set(hud[key].dom, value);
      }
    }

    function formatTime(dt) {
      var minutes = Math.floor(dt/60);
      var seconds = Math.floor(dt - (minutes * 60));
      var tenths  = Math.floor(10 * (dt - Math.floor(dt)));
      if (minutes > 0)
        return minutes + "." + (seconds < 10 ? "0" : "") + seconds + "." + tenths;
      else
        return seconds + "." + tenths;
    }

    function showFinishScreen() {
      // Stop engine audio
      if (engineSound) stopEngineSound(engineSound);

      // Create finish overlay
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;font-family:"Press Start 2P",monospace;';

      var carName = playerCarData ? playerCarData.name : 'Your Car';
      var fastLap = Dom.storage.fast_lap_time ? formatTime(Util.toFloat(Dom.storage.fast_lap_time)) : '--';

      overlay.innerHTML =
        '<div style="text-align:center;color:#fff;max-width:600px;padding:20px;">' +
          '<div style="color:#ffd700;font-size:28px;margin-bottom:20px;">CRUISE COMPLETE!</div>' +
          '<div style="font-size:14px;margin-bottom:30px;">' + carName + '</div>' +
          '<div style="background:rgba(255,255,255,0.1);padding:20px;border-radius:8px;margin-bottom:20px;">' +
            '<div style="margin-bottom:12px;font-size:12px;color:#aaa;">TOTAL TIME</div>' +
            '<div style="font-size:24px;color:#ffd700;margin-bottom:20px;">' + formatTime(totalRaceTime) + '</div>' +
            '<div style="margin-bottom:8px;font-size:10px;color:#aaa;">FASTEST LAP</div>' +
            '<div style="font-size:16px;color:#4f4;">' + fastLap + '</div>' +
          '</div>' +
          '<div style="margin-bottom:30px;font-size:10px;color:#888;">' +
            (playerCarData ? playerCarData.hp + ' HP | ' + playerCarData.weight.toLocaleString() + ' lbs | Gear ' + (playerCarData.gears || 5) + '-speed' : '') +
          '</div>' +
          '<div id="finish-continue" style="display:inline-block;background:#ffd700;color:#000;padding:12px 30px;font-size:14px;cursor:pointer;margin:8px;">' +
            'CONTINUE' +
          '</div>' +
        '</div>';

      document.body.appendChild(overlay);

      // Redirect to /race with the same car
      var raceUrl = '/arcade' + (playerCarData ? '?car=' + playerCarData.id : '');

      document.getElementById('finish-continue').addEventListener('click', function() {
        window.location.href = raceUrl;
      });

      // Also auto-redirect after 10 seconds
      setTimeout(function() {
        if (raceFinished) window.location.href = raceUrl;
      }, 10000);
    }

    //=========================================================================
    // CAR STATS → GAME PHYSICS
    //=========================================================================

    var baseMaxSpeed = segmentLength/step * 0.55;  // cruise ceiling — 55% of original

    // Maps real car data onto game physics variables.
    // Uses ACTUAL stored stats: topSpeed (mph) and hp from the database.
    //
    // Top speed mapping:
    //   car.topSpeed 80 mph  → 50% of game max (slow truck)
    //   car.topSpeed 150 mph → 80% of game max (average car)
    //   car.topSpeed 200 mph → 100% of game max (supercar)
    //
    // Acceleration from HP/weight ratio:
    //   Low pwr  (~25 hp/1000lb) → sluggish accel
    //   High pwr (~170 hp/1000lb) → rocket accel
    function applyCarStats(car) {
      // --- Top speed from actual stored value ---
      var topMph = car.topSpeed || 150;
      var speedT = Math.max(0, Math.min(1, (topMph - 80) / (200 - 80)));
      maxSpeed = baseMaxSpeed * (0.50 + 0.50 * speedT);

      // --- Acceleration from HP/weight ratio ---
      var pwr = car.hp / (car.weight / 1000);  // hp per 1000 lbs
      var pwrT = Math.max(0, Math.min(1, (pwr - 25) / (170 - 25)));
      // Range: maxSpeed/14 (slow cruise) to maxSpeed/8 (brisk)
      // Much more gradual than original — enjoy the drive
      accel = maxSpeed / (14 - 6 * pwrT);

      // --- Braking: lighter/sportier cars stop faster ---
      breaking = -(maxSpeed * (0.6 + 0.4 * pwrT));

      // Coast deceleration stays proportional
      decel = -maxSpeed / 5;

      // --- Off-road: heavy cars bog down more ---
      var weightT = Math.max(0, Math.min(1, (car.weight - 2000) / (5000 - 2000)));
      offRoadDecel = -(maxSpeed * (0.4 + 0.2 * weightT));
      offRoadLimit = maxSpeed / (5 + 2 * weightT);

      // Store real top speed for HUD display
      playerTopSpeedMph = topMph;
    }

    var playerTopSpeedMph = 150;  // actual top speed in MPH for HUD

    //=========================================================================
    // ENGINE AUDIO — per-car sound profiles via Web Audio API
    //=========================================================================

    var audioCtx = null;
    var engineSound = null;  // current EngineSound instance

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function resolveEngineProfile(engineType, cylinders) {
      var et = (engineType || '').toLowerCase();
      if (et.indexOf('electric') >= 0 || et === 'ev')
        return { wave: 'sine', baseF: 400, maxF: 900, minG: 0.03, maxG: 0.08, harmonics: [{m:2, g:0.4}] };
      if (et.indexOf('diesel') >= 0)
        return { wave: 'square', baseF: 55, maxF: 120, minG: 0.06, maxG: 0.15, harmonics: [{m:2, g:0.5},{m:3, g:0.25}] };
      if (et.indexOf('turbo') >= 0 || et.indexOf('inline') >= 0)
        return { wave: 'triangle', baseF: 180, maxF: 450, minG: 0.04, maxG: 0.10, harmonics: [{m:2, g:0.45},{m:3.5, g:0.2}] };
      if (et.indexOf('flat') >= 0 || et.indexOf('boxer') >= 0)
        return { wave: 'sawtooth', baseF: 100, maxF: 300, minG: 0.05, maxG: 0.12, harmonics: [{m:1.5, g:0.5},{m:2.5, g:0.3}] };
      // Default: V-type / muscle
      var bf = (cylinders || 4) >= 8 ? 75 : (cylinders || 4) >= 6 ? 100 : 140;
      return { wave: 'sawtooth', baseF: bf, maxF: bf * 3.5, minG: 0.05, maxG: 0.13, harmonics: [{m:2, g:0.5},{m:3, g:0.3},{m:4, g:0.15}] };
    }

    function createEngineSound(engineType, cylinders) {
      var prof = resolveEngineProfile(engineType, cylinders);
      return { profile: prof, master: null, nodes: [], running: false };
    }

    function startEngineSound(es) {
      if (es.running) return;
      try { var ctx = getAudioCtx(); } catch(e) { return; }
      es.master = ctx.createGain();
      es.master.gain.setValueAtTime(0, ctx.currentTime);
      es.master.connect(ctx.destination);

      // Fundamental
      var osc0 = ctx.createOscillator();
      osc0.type = es.profile.wave;
      osc0.frequency.setValueAtTime(es.profile.baseF, ctx.currentTime);
      var g0 = ctx.createGain();
      g0.gain.setValueAtTime(1.0, ctx.currentTime);
      osc0.connect(g0); g0.connect(es.master);
      es.nodes.push({ osc: osc0, gain: g0 });

      // Harmonics
      es.profile.harmonics.forEach(function(h) {
        var o = ctx.createOscillator();
        o.type = es.profile.wave;
        o.frequency.setValueAtTime(es.profile.baseF * h.m, ctx.currentTime);
        var g = ctx.createGain();
        g.gain.setValueAtTime(h.g, ctx.currentTime);
        o.connect(g); g.connect(es.master);
        es.nodes.push({ osc: o, gain: g });
      });

      es.nodes.forEach(function(n) { n.osc.start(); });
      es.running = true;
    }

    var currentGear = 1;
    var shiftCooldown = 0; // frames remaining in shift dip

    function updateEngineSound(es, speedNorm, isAccel) {
      if (!es.running || !audioCtx || !es.master) return;
      var t = audioCtx.currentTime;
      var sp = Math.max(0, Math.min(1, speedNorm));
      var p = es.profile;

      // --- Transmission simulation ---
      // Divide speed range into gears. Within each gear, RPM (frequency)
      // climbs from low to high, then drops on upshift.
      var numGears = (playerCarData && playerCarData.gears) ? playerCarData.gears : 5;
      var gearSize = 1.0 / numGears;

      // Which gear are we in?
      var newGear = Math.min(numGears, Math.floor(sp / gearSize) + 1);
      if (sp >= 1.0) newGear = numGears;

      // Detect upshift
      if (newGear > currentGear && sp > 0.05) {
        currentGear = newGear;
        shiftCooldown = 8; // ~8 frames of volume dip (~130ms at 60fps)
      }
      // Detect downshift (deceleration)
      if (newGear < currentGear) {
        currentGear = newGear;
      }

      // RPM within current gear: 0.0 (just shifted) to 1.0 (about to shift)
      var gearStart = (currentGear - 1) * gearSize;
      var rpmInGear = Math.max(0, Math.min(1, (sp - gearStart) / gearSize));

      // Frequency: climbs within gear from ~40% to 100% of max range
      // Higher gears have a slightly higher base (gear whine effect)
      var gearBaseMult = 0.35 + (currentGear - 1) * 0.05; // 0.35, 0.40, 0.45, ...
      var freq = p.baseF + (p.maxF - p.baseF) * (gearBaseMult + (1 - gearBaseMult) * rpmInGear);

      // Volume: normal + shift dip
      var vol = (p.minG + (p.maxG - p.minG) * sp) * (isAccel ? 1.0 : 0.6);
      if (shiftCooldown > 0) {
        vol *= 0.3; // brief volume dip during shift
        shiftCooldown--;
      }

      es.master.gain.linearRampToValueAtTime(vol, t + 0.01);

      var mults = [1.0];
      p.harmonics.forEach(function(h) { mults.push(h.m); });
      for (var i = 0; i < es.nodes.length; i++) {
        es.nodes[i].osc.frequency.linearRampToValueAtTime(freq * (mults[i] || 1), t + 0.01);
      }
    }

    function stopEngineSound(es) {
      if (!es.running) return;
      es.running = false;
      if (es.master && audioCtx) {
        es.master.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
      }
      setTimeout(function() {
        es.nodes.forEach(function(n) {
          try { n.osc.stop(); n.osc.disconnect(); n.gain.disconnect(); } catch(e) {}
        });
        if (es.master) es.master.disconnect();
        es.nodes = []; es.master = null;
      }, 250);
    }

    //=========================================================================
    // RENDER THE GAME WORLD
    //=========================================================================

    function render() {

      var baseSegment   = findSegment(position);
      var basePercent   = Util.percentRemaining(position, segmentLength);
      var playerSegment = findSegment(position+playerZ);
      var playerPercent = Util.percentRemaining(position+playerZ, segmentLength);
      var playerY       = Util.interpolate(playerSegment.p1.world.y, playerSegment.p2.world.y, playerPercent);
      var maxy          = height;

      var x  = 0;
      var dx = - (baseSegment.curve * basePercent);

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      Render.background(ctx, background, width, height, BACKGROUND.SKY,   skyOffset,  resolution * skySpeed  * playerY);
      Render.background(ctx, background, width, height, BACKGROUND.HILLS, hillOffset, resolution * hillSpeed * playerY);
      Render.background(ctx, background, width, height, BACKGROUND.TREES, treeOffset, resolution * treeSpeed * playerY);

      var n, i, segment, car, sprite, spriteScale, spriteX, spriteY;

      for(n = 0 ; n < drawDistance ; n++) {

        segment        = segments[(baseSegment.index + n) % segments.length];
        segment.looped = segment.index < baseSegment.index;
        segment.fog    = Util.exponentialFog(n/drawDistance, fogDensity);
        segment.clip   = maxy;

        Util.project(segment.p1, (playerX * roadWidth) - x,      playerY + cameraHeight, position - (segment.looped ? trackLength : 0), cameraDepth, width, height, roadWidth);
        Util.project(segment.p2, (playerX * roadWidth) - x - dx, playerY + cameraHeight, position - (segment.looped ? trackLength : 0), cameraDepth, width, height, roadWidth);

        x  = x + dx;
        dx = dx + segment.curve;

        if ((segment.p1.camera.z <= cameraDepth)         || // behind us
            (segment.p2.screen.y >= segment.p1.screen.y) || // back face cull
            (segment.p2.screen.y >= maxy))                  // clip by (already rendered) hill
          continue;

        Render.segment(ctx, width, lanes,
                       segment.p1.screen.x,
                       segment.p1.screen.y,
                       segment.p1.screen.w,
                       segment.p2.screen.x,
                       segment.p2.screen.y,
                       segment.p2.screen.w,
                       segment.fog,
                       segment.color);

        maxy = segment.p1.screen.y;
      }

      for(n = (drawDistance-1) ; n > 0 ; n--) {
        segment = segments[(baseSegment.index + n) % segments.length];

        for(i = 0 ; i < segment.cars.length ; i++) {
          car         = segment.cars[i];
          sprite      = car.sprite;
          spriteScale = Util.interpolate(segment.p1.screen.scale, segment.p2.screen.scale, car.percent);
          spriteX     = Util.interpolate(segment.p1.screen.x,     segment.p2.screen.x,     car.percent) + (spriteScale * car.offset * roadWidth * width/2);
          spriteY     = Util.interpolate(segment.p1.screen.y,     segment.p2.screen.y,     car.percent);
          if (car.dynamicImage) {
            // Draw car show car image directly
            var destW = (sprite.w * spriteScale * width/2) * (SPRITES.SCALE * roadWidth);
            var destH = (sprite.h * spriteScale * width/2) * (SPRITES.SCALE * roadWidth);
            var dx = spriteX + (destW * -0.5);
            var dy = spriteY + (destH * -1);
            var clipH = segment.clip ? Math.max(0, dy + destH - segment.clip) : 0;
            if (clipH < destH) {
              ctx.drawImage(car.dynamicImage, dx, dy, destW, destH - clipH);
            }
          } else {
            Render.sprite(ctx, width, height, resolution, roadWidth, sprites, car.sprite, spriteScale, spriteX, spriteY, -0.5, -1, segment.clip);
          }
        }

        for(i = 0 ; i < segment.sprites.length ; i++) {
          sprite      = segment.sprites[i];
          spriteScale = segment.p1.screen.scale;
          spriteX     = segment.p1.screen.x + (spriteScale * sprite.offset * roadWidth * width/2);
          spriteY     = segment.p1.screen.y;
          if (sprite.dynamicImage) {
            // Use the EXACT same rendering path as original sprites (Render.sprite)
            // but pass the dynamic image as the spritesheet source.
            // This guarantees identical positioning, scaling, and clipping.
            var bImgW = sprite.dynamicImage.naturalWidth || 300;
            var bImgH = sprite.dynamicImage.naturalHeight || 200;
            // Create a fake sprite rect that covers the entire image
            var dynSprite = { x: 0, y: 0, w: sprite.source.w, h: sprite.source.h };
            var bOffX = (sprite.offset < 0 ? -1 : 0);

            var stW = (dynSprite.w * spriteScale * width/2) * (SPRITES.SCALE * roadWidth);
            var stH = (dynSprite.h * spriteScale * width/2) * (SPRITES.SCALE * roadWidth);
            var stX = spriteX + (stW * bOffX);
            var stY = spriteY + (stH * -1);
            var stClip = segment.clip ? Math.max(0, stY + stH - segment.clip) : 0;

            if (stClip < stH) {
              if (sprite.isBillboard) {
                // Billboard with frame: posts + white backing + logo
                var postW = Math.max(2, stW * 0.03);
                var postH = stH * 0.30;
                var boardH = stH - postH;
                var pad = Math.max(2, stW * 0.04);
                // Posts
                ctx.fillStyle = '#444444';
                ctx.fillRect(stX + stW * 0.25 - postW/2, stY + boardH, postW, postH);
                ctx.fillRect(stX + stW * 0.75 - postW/2, stY + boardH, postW, postH);
                // White backing
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(stX, stY, stW, boardH);
                // Border
                ctx.strokeStyle = '#333333';
                ctx.lineWidth = Math.max(1, pad * 0.3);
                ctx.strokeRect(stX, stY, stW, boardH);
                // Logo
                ctx.drawImage(sprite.dynamicImage, stX + pad, stY + pad, stW - pad*2, boardH - pad*2);
              } else {
                // Storefront: flat image
                var srcClipH = bImgH * stClip / stH;
                ctx.drawImage(sprite.dynamicImage, 0, 0, bImgW, bImgH - srcClipH, stX, stY, stW, stH - stClip);
              }
            }
          } else {
            Render.sprite(ctx, width, height, resolution, roadWidth, sprites, sprite.source, spriteScale, spriteX, spriteY, (sprite.offset < 0 ? -1 : 0), -1, segment.clip);
          }
        }

        if (segment == playerSegment) {
          if (playerCarImage) {
            // Draw player's car show car with correct aspect ratio
            var pImgW = playerCarImage.naturalWidth || 80;
            var pImgH = playerCarImage.naturalHeight || 80;
            var pScale = cameraDepth/playerZ;
            var pRefW = 80; // reference width matching original player sprite
            var pRefH = Math.round(pRefW * (pImgH / pImgW));
            var pDestW = (pRefW * pScale * width/2) * (SPRITES.SCALE * roadWidth);
            var pDestH = (pRefH * pScale * width/2) * (SPRITES.SCALE * roadWidth);
            // Subtle horizontal shift on steering (no skew/rotation)
            var steerShift = (keyLeft ? -1 : keyRight ? 1 : 0) * (speed/maxSpeed) * 8;
            var pDestX = width/2 - pDestW/2 + steerShift;
            var pDestY = (height/2) - (cameraDepth/playerZ * Util.interpolate(playerSegment.p1.camera.y, playerSegment.p2.camera.y, playerPercent) * height/2) - pDestH;
            var pBounce = (1.5 * Math.random() * (speed/maxSpeed) * resolution) * Util.randomChoice([-1,1]);
            ctx.drawImage(playerCarImage, pDestX, pDestY + pBounce, pDestW, pDestH);
          } else {
            Render.player(ctx, width, height, resolution, roadWidth, sprites, speed/maxSpeed,
                          cameraDepth/playerZ,
                          width/2,
                          (height/2) - (cameraDepth/playerZ * Util.interpolate(playerSegment.p1.camera.y, playerSegment.p2.camera.y, playerPercent) * height/2),
                          speed * (keyLeft ? -1 : keyRight ? 1 : 0),
                          playerSegment.p2.world.y - playerSegment.p1.world.y);
          }
        }
      }

      // --- Dashboard overlay (below the road viewport) ---
      if (playerDashImage) {
        var dY = height; // dashboard starts right at the bottom of the road viewport
        var dW = width;  // use game width (1024), not canvas.width
        var dH = dashHeight;
        var imgW = playerDashImage.naturalWidth;
        var imgH = playerDashImage.naturalHeight;

        // Fill the full width, anchor from the top of the image down
        var srcW = imgW;
        var srcH = Math.round(imgW * (dH / dW)); // how much of the image height we can show
        if (srcH > imgH) srcH = imgH;

        ctx.drawImage(playerDashImage, 0, 0, srcW, srcH, 0, dY, dW, dH);

        // Subtle vignette at the seam
        var grad = ctx.createLinearGradient(0, dY - 3, 0, dY + 10);
        grad.addColorStop(0, 'rgba(0,0,0,0.4)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, dY - 3, dW, 13);
      }
    }

    function findSegment(z) {
      return segments[Math.floor(z/segmentLength) % segments.length]; 
    }

    //=========================================================================
    // BUILD ROAD GEOMETRY
    //=========================================================================

    function lastY() { return (segments.length == 0) ? 0 : segments[segments.length-1].p2.world.y; }

    function addSegment(curve, y) {
      var n = segments.length;
      segments.push({
          index: n,
             p1: { world: { y: lastY(), z:  n   *segmentLength }, camera: {}, screen: {} },
             p2: { world: { y: y,       z: (n+1)*segmentLength }, camera: {}, screen: {} },
          curve: curve,
        sprites: [],
           cars: [],
          color: Math.floor(n/rumbleLength)%2 ? COLORS.DARK : COLORS.LIGHT
      });
    }

    function addSprite(n, sprite, offset) {
      segments[n].sprites.push({ source: sprite, offset: offset });
    }

    function addRoad(enter, hold, leave, curve, y) {
      var startY   = lastY();
      var endY     = startY + (Util.toInt(y, 0) * segmentLength);
      var n, total = enter + hold + leave;
      for(n = 0 ; n < enter ; n++)
        addSegment(Util.easeIn(0, curve, n/enter), Util.easeInOut(startY, endY, n/total));
      for(n = 0 ; n < hold  ; n++)
        addSegment(curve, Util.easeInOut(startY, endY, (enter+n)/total));
      for(n = 0 ; n < leave ; n++)
        addSegment(Util.easeInOut(curve, 0, n/leave), Util.easeInOut(startY, endY, (enter+hold+n)/total));
    }

    var ROAD = {
      LENGTH: { NONE: 0, SHORT:  25, MEDIUM:   50, LONG:  100 },
      HILL:   { NONE: 0, LOW:    20, MEDIUM:   40, HIGH:   60 },
      CURVE:  { NONE: 0, EASY:    2, MEDIUM:    4, HARD:    6 }
    };

    function addStraight(num) {
      num = num || ROAD.LENGTH.MEDIUM;
      addRoad(num, num, num, 0, 0);
    }

    function addHill(num, height) {
      num    = num    || ROAD.LENGTH.MEDIUM;
      height = height || ROAD.HILL.MEDIUM;
      addRoad(num, num, num, 0, height);
    }

    function addCurve(num, curve, height) {
      num    = num    || ROAD.LENGTH.MEDIUM;
      curve  = curve  || ROAD.CURVE.MEDIUM;
      height = height || ROAD.HILL.NONE;
      addRoad(num, num, num, curve, height);
    }
        
    function addLowRollingHills(num, height) {
      num    = num    || ROAD.LENGTH.SHORT;
      height = height || ROAD.HILL.LOW;
      addRoad(num, num, num,  0,                height/2);
      addRoad(num, num, num,  0,               -height);
      addRoad(num, num, num,  ROAD.CURVE.EASY,  height);
      addRoad(num, num, num,  0,                0);
      addRoad(num, num, num, -ROAD.CURVE.EASY,  height/2);
      addRoad(num, num, num,  0,                0);
    }

    function addSCurves() {
      addRoad(ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM,  -ROAD.CURVE.EASY,    ROAD.HILL.NONE);
      addRoad(ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM,   ROAD.CURVE.MEDIUM,  ROAD.HILL.MEDIUM);
      addRoad(ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM,   ROAD.CURVE.EASY,   -ROAD.HILL.LOW);
      addRoad(ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM,  -ROAD.CURVE.EASY,    ROAD.HILL.MEDIUM);
      addRoad(ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM, ROAD.LENGTH.MEDIUM,  -ROAD.CURVE.MEDIUM, -ROAD.HILL.MEDIUM);
    }

    function addBumps() {
      addRoad(10, 10, 10, 0,  5);
      addRoad(10, 10, 10, 0, -2);
      addRoad(10, 10, 10, 0, -5);
      addRoad(10, 10, 10, 0,  8);
      addRoad(10, 10, 10, 0,  5);
      addRoad(10, 10, 10, 0, -7);
      addRoad(10, 10, 10, 0,  5);
      addRoad(10, 10, 10, 0, -2);
    }

    function addDownhillToEnd(num) {
      num = num || 200;
      addRoad(num, num, num, -ROAD.CURVE.EASY, -lastY()/segmentLength);
    }

    function resetRoad() {
      segments = [];

      // Route 14 — a flat commercial highway with gentle curves
      // Much shorter than the original track so businesses are packed tighter
      addStraight(ROAD.LENGTH.SHORT);                                          // starting straight
      addCurve(ROAD.LENGTH.SHORT, ROAD.CURVE.EASY, 0);                        // gentle right
      addStraight(ROAD.LENGTH.SHORT);                                          // past first shops
      addCurve(ROAD.LENGTH.SHORT, -ROAD.CURVE.EASY, ROAD.HILL.LOW);           // gentle left, slight rise
      addStraight(ROAD.LENGTH.SHORT);                                          // Crystal Point area
      addCurve(ROAD.LENGTH.SHORT, ROAD.CURVE.EASY, 0);                        // gentle right
      addStraight(ROAD.LENGTH.SHORT);                                          // more shops
      addCurve(ROAD.LENGTH.SHORT, -ROAD.CURVE.EASY, -ROAD.HILL.LOW);          // gentle left, back down
      addStraight(ROAD.LENGTH.SHORT);                                          // The Commons area
      addDownhillToEnd(ROAD.LENGTH.SHORT);                                     // finish

      resetSprites();
      resetCars();

      segments[findSegment(playerZ).index + 2].color = COLORS.START;
      segments[findSegment(playerZ).index + 3].color = COLORS.START;
      for(var n = 0 ; n < rumbleLength ; n++)
        segments[segments.length-1-n].color = COLORS.FINISH;

      trackLength = segments.length * segmentLength;
    }

    // Add a roadside sprite — extended to support dynamic images
    function addDynamicSprite(n, sprite, offset, dynamicImage, isBillboard) {
      segments[n].sprites.push({ source: sprite, offset: offset, dynamicImage: dynamicImage || null, isBillboard: !!isBillboard });
    }

    function resetSprites() {
      var n, i;

      // =====================================================================
      // SPONSOR BILLBOARDS
      // =====================================================================
      // Place sponsor logos along the road based on their tier.
      // Presenting sponsors: appear every 80 segments, both sides
      // Premier sponsors: appear every 120 segments
      // Community sponsors: appear every 200 segments
      // Fall back to original billboards if no sponsors

      var presenting = [];
      var premier = [];
      var community = [];

      sponsorData.forEach(function(s, idx) {
        var img = sponsorImages[idx];
        if (!img) return;
        var tier = (s.tier || '').toLowerCase();
        if (s.isPresenting || tier.indexOf('presenting') >= 0) {
          presenting.push(img);
        } else if (tier.indexOf('premier') >= 0) {
          premier.push(img);
        } else {
          community.push(img);
        }
      });

      var hasSponsorBillboards = (presenting.length + premier.length + community.length) > 0;

      if (hasSponsorBillboards) {
        // Sponsor billboards with frame — evenly spaced, opposite side from storefronts
        var allSponsors = [];
        presenting.forEach(function(img) { allSponsors.push({ img: img, w: 350, h: 250 }); });
        presenting.forEach(function(img) { allSponsors.push({ img: img, w: 350, h: 250 }); }); // presenting twice
        premier.forEach(function(img) { allSponsors.push({ img: img, w: 300, h: 200 }); });
        community.forEach(function(img) { allSponsors.push({ img: img, w: 250, h: 170 }); });

        if (allSponsors.length > 0) {
          var sponsorSpacing = Math.max(8, Math.floor((segments.length - 40) / allSponsors.length));
          for (var si = 0; si < allSponsors.length; si++) {
            var sSeg = 5 + si * sponsorSpacing;
            // Alternate sides, pushed further out than storefronts
            var sponsorSide = (si % 2 === 0) ? 2.0 : -2.0;
            addDynamicSprite(sSeg, { w: allSponsors[si].w, h: allSponsors[si].h }, sponsorSide, allSponsors[si].img, true);
          }
        }
      } else {
        // No sponsors — fall back to original billboards
        addSprite(20,  SPRITES.BILLBOARD07, -1);
        addSprite(40,  SPRITES.BILLBOARD06, -1);
        addSprite(60,  SPRITES.BILLBOARD08, -1);
        addSprite(80,  SPRITES.BILLBOARD09, -1);
        addSprite(100, SPRITES.BILLBOARD01, -1);
        addSprite(120, SPRITES.BILLBOARD02, -1);
        addSprite(140, SPRITES.BILLBOARD03, -1);
        addSprite(160, SPRITES.BILLBOARD04, -1);
        addSprite(180, SPRITES.BILLBOARD05, -1);

        addSprite(240,                  SPRITES.BILLBOARD07, -1.2);
        addSprite(240,                  SPRITES.BILLBOARD06,  1.2);
        addSprite(segments.length - 25, SPRITES.BILLBOARD07, -1.2);
        addSprite(segments.length - 25, SPRITES.BILLBOARD06,  1.2);

        var side, sprite, offset;
        for(n = 1000 ; n < (segments.length-50) ; n += 100) {
          side = Util.randomChoice([1, -1]);
          addSprite(n + Util.randomInt(0, 50), Util.randomChoice(SPRITES.BILLBOARDS), -side);
          for(i = 0 ; i < 20 ; i++) {
            sprite = Util.randomChoice(SPRITES.PLANTS);
            offset = side * (1.5 + Math.random());
            addSprite(n + Util.randomInt(0, 50), sprite, offset);
          }
        }
      }

      // =====================================================================
      // ROADSIDE SCENERY — Crystal Lake, IL themed
      // Falls back to original sprites if CL assets aren't loaded
      // =====================================================================

      var hasCLScenery = Object.keys(clScenery).length > 5; // need at least a few loaded

      // Helper: add a CL scenery sprite if loaded, otherwise use a fallback
      function addCL(seg, key, offset, fallback) {
        var m = CL_SCENERY_MANIFEST[key];
        if (clScenery[key] && m) {
          addDynamicSprite(seg, { w: m.w, h: m.h }, offset, clScenery[key]);
        } else if (fallback) {
          addSprite(seg, fallback, offset);
        }
      }

      // =====================================================================
      // ROADSIDE SCENERY — Original spritesheet trees + CL commercial buildings
      // =====================================================================
      // Use the original game's polished tree/plant sprites for nature.
      // Only use dynamic CL assets for Route 14 branded storefronts.

      // --- Trees and plants (Midwest appropriate) ---
      // Only TREE1, TREE2 (green deciduous), BUSH1, BUSH2, and boulders
      // No palms, cacti, dead trees, or castle columns
      // Only TREE1 and TREE2 — the two normal green deciduous trees.
      // Everything else in the spritesheet looks tropical or fantasy.

      // Trees lining the road — sparse, pushed back, with gaps for businesses
      // Track which segments have businesses so we skip trees there
      var businessSegments = {};
      for (n = 200; n < segments.length - 100; n += 80) {
        for (var bs = n - 10; bs <= n + 10; bs++) businessSegments[bs] = true;
      }

      for(n = 10 ; n < segments.length ; n += 10) {
        if (businessSegments[n]) continue; // don't plant trees where businesses go
        var treeSide = Util.randomChoice([1, -1]);
        addSprite(n, Util.randomChoice([SPRITES.TREE1, SPRITES.TREE2]), treeSide * (2 + Math.random() * 3));
      }

      // --- Route 14 branded storefronts (dynamic CL assets) ---
      // Actual businesses along Route 14 / Northwest Hwy, Crystal Lake, IL
      // Ordered heading NORTHWEST (east-to-west, matching the real drive)
      // Each business appears EXACTLY ONCE per lap
      var commercialKeys = [
        // Heading SE → NW along Route 14, ordered by actual street address
        // SE end (~4465-4912 NW Hwy)
        'petsmart',         // 4465
        'outback',          // 4751
        'chick-fil-a',      // 4812
        'menards',          // 4850
        'noodles',          // 4912
        // Mid-SE (~5006-5501 NW Hwy)
        'chipotle',         // 5006 Ste A
        'jersey-mikes',     // 5006 Ste E
        'exceed-flooring',  // 5186
        'raising-canes',    // 5417
        'crumbl-cookies',   // 5500

    function resetCars() {
      cars = [];
      var n, car, segment, offset, z, sprite, speed;
      for (var n = 0 ; n < totalCars ; n++) {
        offset = Math.random() * Util.randomChoice([-0.8, 0.8]);
        z      = Math.floor(Math.random() * segments.length) * segmentLength;

        // Try to use a car show car
        var showCar = null;
        var dynamicImage = null;
        if (carShowData.length > 0) {
          showCar = carShowData[n % carShowData.length];
          dynamicImage = carShowImages[showCar.id] || null;
        }

        if (dynamicImage) {
          // Use actual image aspect ratio, scaled to ~80px reference width
          var imgW = dynamicImage.naturalWidth || 80;
          var imgH = dynamicImage.naturalHeight || 56;
          var scaledH = Math.round(80 * (imgH / imgW));
          sprite = { w: 80, h: scaledH };
        } else {
          sprite = Util.randomChoice(SPRITES.CARS);
        }

        // NPC speeds — cruising, not racing. Most going around the same speed as player.
        if (showCar && dynamicImage) {
          var pwrRatio = showCar.hp / (showCar.weight / 1000);
          // Range: 40%-70% of maxSpeed — gentle spread, everyone cruising
          speed = maxSpeed * 0.40 + (pwrRatio / 200) * maxSpeed * 0.30;
          speed = Math.min(speed, maxSpeed * 0.70);
        } else {
          speed = maxSpeed * 0.35 + Math.random() * maxSpeed * 0.30;
        }

        car = { offset: offset, z: z, sprite: sprite, speed: speed, dynamicImage: dynamicImage, showCar: showCar };
        segment = findSegment(car.z);
        segment.cars.push(car);
        cars.push(car);
      }

          supabaseBaseUrl = testUrl.split('/storage/')[0];

      Game.run({
        canvas: canvas, render: render, update: update, stats: stats, step: step,
        images: ["background", "sprites"],
        keys: [
          { keys: [KEY.LEFT,  KEY.A], mode: 'down', action: function() { keyLeft   = true;  } },
          { keys: [KEY.RIGHT, KEY.D], mode: 'down', action: function() { keyRight  = true;  } },
          { keys: [KEY.UP,    KEY.W], mode: 'down', action: function() { keyFaster = true;  } },
          { keys: [KEY.DOWN,  KEY.S], mode: 'down', action: function() { keySlower = true;  } },
          { keys: [KEY.LEFT,  KEY.A], mode: 'up',   action: function() { keyLeft   = false; } },
          { keys: [KEY.RIGHT, KEY.D], mode: 'up',   action: function() { keyRight  = false; } },
          { keys: [KEY.UP,    KEY.W], mode: 'up',   action: function() { keyFaster = false; } },
          { keys: [KEY.DOWN,  KEY.S], mode: 'up',   action: function() { keySlower = false; } }
        ],
        ready: function(images) {
          background = images[0];
          sprites    = images[1];
          reset();
          Dom.storage.fast_lap_time = Dom.storage.fast_lap_time || 180;
          updateHud('fast_lap_time', formatTime(Util.toFloat(Dom.storage.fast_lap_time)));

            Dom.show('gear');
            applyCarStats(playerCarData);
            // Start engine audio on first user interaction (required by browsers)
            engineSound = createEngineSound(playerCarData.engineType, playerCarData.cylinders);

          fitCanvas();
        }
      });

    function reset(options) {
      options       = options || {};
      width  = Util.toInt(options.width,          width);
      height = Util.toInt(options.height,         height);
      // Canvas is taller than the game viewport to fit the dashboard below
      var actualDashH = playerDashImage ? dashHeight : 0;
      canvas.width  = width;
      canvas.height = height + actualDashH;
      lanes                  = Util.toInt(options.lanes,          lanes);
      roadWidth              = Util.toInt(options.roadWidth,      roadWidth);
      cameraHeight           = Util.toInt(options.cameraHeight,   cameraHeight);
      drawDistance           = Util.toInt(options.drawDistance,   drawDistance);
      fogDensity             = Util.toInt(options.fogDensity,     fogDensity);
      fieldOfView            = Util.toInt(options.fieldOfView,    fieldOfView);
      segmentLength          = Util.toInt(options.segmentLength,  segmentLength);
      rumbleLength           = Util.toInt(options.rumbleLength,   rumbleLength);
      cameraDepth            = 1 / Math.tan((fieldOfView/2) * Math.PI/180);
      playerZ                = (cameraHeight * cameraDepth);
      resolution             = height/480;
      refreshTweakUI();

      if ((segments.length==0) || (options.segmentLength) || (options.rumbleLength))
        resetRoad(); // only rebuild road when necessary

    //=========================================================================
    // MOBILE TOUCH CONTROLS
    //=========================================================================
    // Auto-accelerate on mobile. Player only steers:
    //   - Touch LEFT half of screen = steer left
    //   - Touch RIGHT half of screen = steer right
    //   - Touch BOTH sides (two thumbs) = brake
    //   - No touch = cruise straight (still accelerating)

    (function() {
      if (!isMobileDevice) return;

      // Always accelerating on mobile
      keyFaster = true;

      var overlay = document.createElement('div');
      overlay.id = 'touch-controls';
      overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;touch-action:none;user-select:none;-webkit-user-select:none;display:flex;';
      overlay.innerHTML =
        '<div id="tc-left" style="flex:1;display:flex;align-items:flex-end;justify-content:center;padding-bottom:15%;">' +
          '<svg width="50" height="50" viewBox="0 0 60 60" style="opacity:0.15;"><polygon points="40,10 10,30 40,50" fill="white"/></svg>' +
        '</div>' +
        '<div id="tc-right" style="flex:1;display:flex;align-items:flex-end;justify-content:center;padding-bottom:15%;">' +
          '<svg width="50" height="50" viewBox="0 0 60 60" style="opacity:0.15;"><polygon points="20,10 50,30 20,50" fill="white"/></svg>' +
        '</div>';
      document.body.appendChild(overlay);

      var activeTouches = {};

      function updateSteering() {
        var hasLeft = false, hasRight = false;
        for (var id in activeTouches) {
          if (activeTouches[id] === 'left') hasLeft = true;
          if (activeTouches[id] === 'right') hasRight = true;
        }

        keyLeft = false;
        keyRight = false;
        keySlower = false;
        keyFaster = true; // always accelerating

        if (hasLeft && hasRight) {
          // Two thumbs = brake
          keyFaster = false;
          keySlower = true;
        } else if (hasLeft) {
          keyLeft = true;
        } else if (hasRight) {
          keyRight = true;
        }
      }

      function getZone(touch) {
        return touch.clientX < window.innerWidth / 2 ? 'left' : 'right';
      }

      overlay.addEventListener('touchstart', function(e) {
        e.preventDefault();
        // Init audio on first touch (mobile browsers require user gesture)
        if (engineSound && !engineSound.running) {
          try { getAudioCtx(); } catch(ex) {}
          startEngineSound(engineSound);
        }
        for (var i = 0; i < e.changedTouches.length; i++) {
          activeTouches[e.changedTouches[i].identifier] = getZone(e.changedTouches[i]);
        }
        updateSteering();
      }, { passive: false });

      overlay.addEventListener('touchmove', function(e) {
        e.preventDefault();
        for (var i = 0; i < e.changedTouches.length; i++) {
          activeTouches[e.changedTouches[i].identifier] = getZone(e.changedTouches[i]);
        }
        updateSteering();
      }, { passive: false });

      overlay.addEventListener('touchend', function(e) {
        e.preventDefault();
        for (var i = 0; i < e.changedTouches.length; i++) {
          delete activeTouches[e.changedTouches[i].identifier];
        }
        updateSteering();
      }, { passive: false });

      overlay.addEventListener('touchcancel', function(e) {
        e.preventDefault();
        for (var i = 0; i < e.changedTouches.length; i++) {
          delete activeTouches[e.changedTouches[i].identifier];
        }
        updateSteering();
      }, { passive: false });

      document.body.style.overflow = 'hidden';
    })();

  </script>

</body>
</html>
